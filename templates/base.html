{% load i18n %}{% load static %}{% load pwa %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}{% trans "TRAVEL_HUB_TITLE" %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <!-- AG Grid Community -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-theme-quartz.css">
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/dist/ag-grid-community.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/de.js"></script>
    
    <style>
        /* Custom AG Grid Thailand Gold Theme */
        .ag-theme-quartz-dark.ag-theme-thailand-gold {
            --ag-foreground-color: var(--text-primary);
            --ag-background-color: var(--bg-color);
            --ag-header-background-color: rgba(197, 160, 89, 0.1);
            --ag-header-foreground-color: var(--accent-gold);
            --ag-row-hover-color: rgba(197, 160, 89, 0.1);
            --ag-selected-row-background-color: rgba(197, 160, 89, 0.2);
            --ag-odd-row-background-color: rgba(255, 255, 255, 0.02);
            --ag-border-color: var(--glass-border);
            --ag-input-focus-border-color: var(--accent-gold);
            --ag-font-size: 0.9rem;
            --ag-font-family: 'Inter', sans-serif;
            border: none;
        }
        .ag-theme-thailand-gold .ag-header {
            border-bottom: 2px solid var(--accent-gold) !important;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ag-theme-thailand-gold .ag-row {
            border-bottom: 1px solid var(--glass-border) !important;
        }
    </style>
    {% progressive_web_app_meta %}
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <header class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div id="trip-switcher-container-wrapper" style="display: flex; align-items: center; gap: 15px; max-width: 70%;">
                {% include 'travel/partials/trip_switcher.html' %}
            </div>
            <div id="nav-actions" style="display: flex; gap: 15px; align-items: center;">
                <button hx-get="{% url 'travel:settings_modal' %}" 
                        hx-target="#modal-container"
                        style="background: none; border: 1px solid var(--glass-border); color: var(--text-secondary); border-radius: 20px; padding: 5px 15px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.3s;"
                        onmouseover="this.style.borderColor='var(--accent-gold)'; this.style.color='var(--accent-gold)'"
                        onmouseout="this.style.borderColor='var(--glass-border)'; this.style.color='var(--text-secondary)'">
                    ⚙️ {% trans "Einstellungen" %}
                </button>
                <a href="/admin/" target="_blank" style="color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; padding: 5px 15px; border: 1px solid var(--glass-border); border-radius: 20px; transition: all 0.3s;" onmouseover="this.style.borderColor='var(--accent-gold)'; this.style.color='var(--accent-gold)'" onmouseout="this.style.borderColor='var(--glass-border)'; this.style.color='var(--text-secondary)'">
                    🛠️ Admin
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Modal Container -->
    <div id="modal-container" hx-target="this" hx-swap="innerHTML">
        <div id="modal-content-wrapper" class="modal-content"></div>
    </div>

    {% block extra_js %}
    <script>
        document.body.addEventListener('htmx:afterSwap', (e) => {
            if (e.detail.target.id === "modal-container") {
                document.getElementById('modal-container').classList.add('show');
                initPickers(); // Initialize date/time pickers in the new modal content
            }
        });

        function closeModal() {
            document.getElementById('modal-container').classList.remove('show');
            setTimeout(() => {
                document.getElementById('modal-container').innerHTML = '';
            }, 300);
        }

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        function initPickers() {
            flatpickr('input[type="date"]', {
                locale: 'de',
                dateFormat: 'Y-m-d',
                altInput: true,
                altFormat: 'd.m.Y',
                disableMobile: "true"
            });
            flatpickr('input[type="time"]', {
                enableTime: true,
                noCalendar: true,
                dateFormat: 'H:i',
                time_24hr: true,
                disableMobile: "true"
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initPickers);

        // Feedback Toast Logic: Only for modifying requests (Saves)
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            const method = evt.detail.requestConfig.method;
            if (evt.detail.xhr.status >= 200 && evt.detail.xhr.status < 300) {
                // Only show "Saved" for POST/PUT/DELETE/PATCH
                if (method !== 'GET') {
                    showToast("✓ Gespeichert");
                }
            } else if (evt.detail.xhr.status >= 400) {
                showToast("⚠️ Fehler!", true);
            }
        });

        function showToast(message, isError = false) {
            let toast = document.getElementById('status-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'status-toast';
                toast.style = 'position: fixed; top: 20px; right: 20px; color: white; padding: 10px 20px; border-radius: 8px; z-index: 9999; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transform: translateY(-100px); transition: transform 0.3s ease;';
                document.body.appendChild(toast);
            }
            toast.innerText = message;
            toast.style.background = isError ? '#e74c3c' : 'var(--accent-teal)';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.transform = 'translateY(-100px)';
            }, 2500);
        }
    </script>


    {% endblock %}
</body>
</html>
