{% load i18n %}{% load static %}{% load pwa %}
<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}{% trans "TRAVEL_HUB_TITLE" %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}?v={% now 'U' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <!-- AG Grid Community -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-theme-quartz.css">
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/dist/ag-grid-community.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/de.js"></script>
    
    <style>
        /* Custom AG Grid Thailand Gold Theme */
        .ag-theme-quartz-dark.ag-theme-thailand-gold {
            --ag-foreground-color: var(--text-primary);
            --ag-background-color: var(--bg-color);
            --ag-header-background-color: rgba(197, 160, 89, 0.1);
            --ag-header-foreground-color: var(--accent-gold);
            --ag-row-hover-color: rgba(197, 160, 89, 0.1);
            --ag-selected-row-background-color: rgba(197, 160, 89, 0.2);
            --ag-odd-row-background-color: rgba(255, 255, 255, 0.02);
            --ag-border-color: var(--glass-border);
            --ag-input-focus-border-color: var(--accent-gold);
            --ag-font-size: 0.9rem;
            --ag-font-family: 'Inter', sans-serif;
            border: none;
        }
        .ag-theme-thailand-gold .ag-header {
            border-bottom: 2px solid var(--accent-gold);
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ag-theme-thailand-gold .ag-row {
            border-bottom: 1px solid var(--glass-border);
        }
    </style>
    {% progressive_web_app_meta %}
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <nav class="navbar navbar-dark bg-dark sticky-top border-bottom border-secondary py-1 py-md-2">
        <div class="container-fluid">
            <div id="trip-switcher-container-wrapper" class="w-100">
                {% include 'travel/partials/trip_switcher.html' %}
            </div>
        </div>
    </nav>

    <main id="main-content" class="container py-3">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Modal Container -->
    <div id="modal-container" hx-target="this" hx-swap="innerHTML">
        <div id="modal-content-wrapper" class="modal-content"></div>
    </div>

    {% block extra_js %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.body.addEventListener('htmx:afterSwap', (e) => {
            if (e.detail.target.id === "modal-container") {
                document.getElementById('modal-container').classList.add('show');
                document.body.classList.add('modal-open');
                initPickers(); // Initialize date/time pickers in the new modal content
            }
        });

        // Specific handling for Diary Updates
        document.body.addEventListener('diaryUpdated', (e) => {
            closeModal();
        });

        function closeModal() {
            const container = document.getElementById('modal-container');
            container.classList.remove('show');
            document.body.classList.remove('modal-open');
            setTimeout(() => {
                if (!container.classList.contains('show')) {
                    container.innerHTML = '';
                }
            }, 300);
        }

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        function initPickers() {
            flatpickr('input[type="date"]', {
                locale: 'de',
                dateFormat: 'Y-m-d',
                altInput: true,
                altFormat: 'd.m.Y',
                allowInput: true
            });
            flatpickr('input[type="time"]', {
                enableTime: true,
                noCalendar: true,
                dateFormat: 'H:i',
                time_24hr: true,
                allowInput: true
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initPickers);

        // Feedback Toast Logic: Only for modifying requests (Saves)
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            const config = evt.detail.requestConfig;
            if (!config) return;

            const method = (config.method || "").toUpperCase();
            if (evt.detail.xhr.status >= 200 && evt.detail.xhr.status < 300) {
                // Only show "Saved" for actual data-modifying operations
                if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) {
                    showToast("✓ Gespeichert");
                }
            } else if (evt.detail.xhr.status >= 400) {
                showToast("⚠️ Fehler!", true);
            }
        });

        function showToast(message, isError = false) {
            let toast = document.getElementById('status-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'status-toast';
                toast.className = 'position-fixed top-0 end-0 m-3 px-3 py-2 rounded-3 text-white fw-bold shadow-lg';
                toast.style.zIndex = '9999';
                toast.style.transform = 'translateY(-100px)';
                toast.style.transition = 'transform 0.3s ease';
                document.body.appendChild(toast);
            }
            toast.innerText = message;
            toast.className = 'position-fixed top-0 end-0 m-3 px-3 py-2 rounded-3 text-white fw-bold shadow-lg ' + (isError ? 'bg-danger' : 'bg-success');
            toast.style.zIndex = '9999';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.transform = 'translateY(-100px)';
            }, 2500);
        }
    </script>


    <div id="lightbox-modal" onclick="this.classList.remove('show')">
    </div>

    <script>
        function openLightbox(src, caption) {
            const modal = document.getElementById('lightbox-modal');
            modal.innerHTML = `
                <img src="${src}" class="img-fluid rounded shadow-lg" alt="${caption || ''}">
                <div class="position-absolute bottom-0 start-50 translate-middle-x mb-4 text-white bg-dark bg-opacity-50 px-3 py-1 rounded-pill">${caption || ''}</div>
                <button class="btn-close btn-close-white position-absolute top-0 end-0 m-3"></button>
            `;
            modal.classList.add('show');
        }

        // --- Scroll Turbo Logic ---
        function scrollToDest(dest) {
            if (dest === 'top') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }
    </script>

    <!-- Floating Scroll Navigator -->
    <div class="scroll-navigator d-flex flex-column gap-2 shadow-lg rounded-pill p-1">
        <button onclick="scrollToDest('top')" class="btn-scroll-nav" title="Ganz nach oben">
            <i class="bi bi-chevron-double-up"></i>
        </button>
        <button onclick="scrollToDest('bottom')" class="btn-scroll-nav" title="Ganz nach unten">
            <i class="bi bi-chevron-double-down"></i>
        </button>
    </div>
    {% endblock %}
</body>
</html>
