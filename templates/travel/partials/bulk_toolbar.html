{% load i18n %}
<!-- Redesigned Floating Command Center (Bulk Toolbar) -->
<div id="bulk-toolbar" class="bulk-toolbar-hidden">
    <div class="toolbar-content-wrapper shadow-lg">
        <!-- Counter & Context Info -->
        <div class="toolbar-header">
            <span id="selection-count">0</span>
            <span id="selection-label">{% trans "TAGE" %}</span>
        </div>
        
        <div class="toolbar-divider"></div>

        <!-- Contextual Toolsets -->
        <div class="toolbar-actions">
            <!-- Day Action Set -->
            <div id="day-toolset" class="toolset" style="display: flex; align-items: center; gap: 15px;">
                <div class="tool-group">
                    <form id="bulk-edit-form" hx-post="{% url 'travel:day_bulk_edit' %}" 
                          hx-target="#trip-overview" hx-include="[name='day_ids']"
                          hx-on::after-request="clearSelection();"
                          style="display: flex; align-items: center; gap: 8px;">
                        <input type="text" name="location" placeholder="Station / Ort setzen..." class="premium-input-sm" required>
                        <button type="submit" class="premium-pill-btn info" title="Station für alle markierten Tage setzen">
                            <i class="bi bi-check-circle-fill me-1"></i> Speichern
                        </button>
                    </form>
                </div>
            </div>

            <!-- Event Action Set (hidden by default) -->
            <div id="event-toolset" class="toolset" style="display: none; align-items: center; gap: 15px;">
                <div class="tool-group">
                    <form id="event-move-form" hx-post="{% url 'travel:event_bulk_move' %}" 
                          hx-target="#trip-overview" hx-include="[name='event_ids']"
                          hx-on::after-request="clearSelection();"
                          style="display: flex; align-items: center; gap: 8px;">
                        <input type="date" name="target_date" class="premium-input-sm" required>
                        <button type="submit" class="premium-pill-btn info" title="Verschieben">
                            <i class="bi bi-arrow-right-short me-1"></i> Schieben
                        </button>
                    </form>
                </div>
                <div class="toolbar-divider mini"></div>
                <button class="premium-pill-btn danger" 
                        hx-post="{% url 'travel:event_bulk_delete' %}" 
                        hx-target="#trip-overview" hx-include="[name='event_ids']"
                        hx-confirm="Alle markierten Einträge wirklich löschen?"
                        hx-on::after-request="clearSelection();">
                    <i class="bi bi-trash3 me-1"></i> Löschen
                </button>
            </div>
        </div>

        <div class="toolbar-divider"></div>

        <button type="button" class="toolbar-close" onclick="clearSelection()" title="Abbrechen">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
</div>

<style>
    #bulk-toolbar .toolset {
        display: flex;
        align-items: center;
    }
    .premium-input-sm {
        min-width: 160px;
    }
</style>
