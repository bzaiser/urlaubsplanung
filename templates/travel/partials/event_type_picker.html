{% load i18n %}
<div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark border">
        <div class="modal-header border-secondary">
            <h5 class="modal-title text-warning">
                <i class="bi bi-plus-circle me-1"></i>Was möchtest du hinzufügen?
            </h5>
            <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
        </div>
        <div class="modal-body">
            <div class="row row-cols-3 g-2">
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=FLIGHT" hx-target="#modal-container">
                        <span class="fs-4">✈️</span><small>Flug</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=HOTEL" hx-target="#modal-container">
                        <span class="fs-4">🏨</span><small>Hotel</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=RENTAL_CAR" hx-target="#modal-container">
                        <span class="fs-4">🔑🚗</span><small>Mietwagen</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=CAR" hx-target="#modal-container">
                        <span class="fs-4">🚗</span><small>Auto</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=CAMPING" hx-target="#modal-container">
                        <span class="fs-4">⛺</span><small>Camping</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=PITCH" hx-target="#modal-container">
                        <span class="fs-4">🚐📍</span><small>Stellplatz</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=TRAIN" hx-target="#modal-container">
                        <span class="fs-4">🚆</span><small>Zug</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=METRO" hx-target="#modal-container">
                        <span class="fs-4">🚇</span><small>Metro</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=TRAM" hx-target="#modal-container">
                        <span class="fs-4">🚋</span><small>Tram</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=BUS" hx-target="#modal-container">
                        <span class="fs-4">🚌</span><small>Bus</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=ACTIVITY" hx-target="#modal-container">
                        <span class="fs-4">🎒</span><small>Aktivität</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=RESTAURANT" hx-target="#modal-container">
                        <span class="fs-4">🍽️</span><small>Essen</small>
                    </button>
                </div>
                <div class="col">
                    <button class="btn btn-outline-secondary w-100 py-3 d-flex flex-column align-items-center gap-1" hx-get="{% url 'travel:event_create' day.id %}?type=OTHER" hx-target="#modal-container">
                        <span class="fs-4">❓</span><small>Sonstiges</small>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
