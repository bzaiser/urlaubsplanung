{% load i18n %}
<div class="modal-dialog modal-md">
    <div class="modal-content bg-dark border">
        <div class="modal-header border-secondary pb-2">
            <h5 class="modal-title text-warning">
                <i class="bi bi-pencil me-1"></i>{% trans "Tag bearbeiten" %}
                <small class="text-secondary fw-normal ms-2">({{ day.date|date:"d. M" }})</small>
            </h5>
            <button type="button" class="btn-close btn-close-white" onclick="closeModal()" aria-label="Close"></button>
        </div>

        <form hx-post="{% url 'travel:day_edit' day.id %}" 
              hx-target="#trip-overview" 
              hx-on::after-request="if(event.detail.successful) closeModal()">
            {% csrf_token %}

            <div class="modal-body">
                <div class="mb-3">
                    <label for="id_location" class="form-label small text-uppercase text-secondary">{% trans "Ort / Name des Tages" %}</label>
                    <input type="text" name="location" id="id_location" 
                           class="form-control" 
                           value="{{ day.location|default:'' }}" 
                           placeholder="z.B. Phuket Town" autofocus>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label for="id_latitude" class="form-label x-small text-uppercase text-secondary">{% trans "Breitengrad" %}</label>
                        <input type="text" name="latitude" id="id_latitude" 
                               class="form-control form-control-sm font-monospace" 
                               value="{{ day.latitude|stringformat:'.6f'|default:'' }}" 
                               placeholder="0.000000">
                    </div>
                    <div class="col-6">
                        <label for="id_longitude" class="form-label x-small text-uppercase text-secondary">{% trans "Längengrad" %}</label>
                        <input type="text" name="longitude" id="id_longitude" 
                               class="form-control form-control-sm font-monospace" 
                               value="{{ day.longitude|stringformat:'.6f'|default:'' }}" 
                               placeholder="0.000000">
                    </div>
                    <div class="col-12 text-end">
                        <small class="x-small text-secondary"><i class="bi bi-geo-alt me-1"></i>{% if day.is_geocoded %}{% trans "Automatisch gefunden" %}{% else %}{% trans "Manuell gesetzt" %}{% endif %}</small>
                    </div>
                </div>
            </div>

            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-sm btn-outline-secondary px-3" onclick="closeModal()">
                    {% trans "Abbrechen" %}
                </button>
                <button type="submit" class="btn btn-warning flex-grow-1">
                    <i class="bi bi-save me-1"></i>{% trans "Speichern" %}
                </button>
            </div>
        </form>
    </div>
</div>
