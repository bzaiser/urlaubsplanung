<div class="modal-header border-0 pb-0">
    <h5 class="modal-title fw-bold text-teal">
        <i class="bi bi-calendar-event me-2"></i>{% if day.location %}{{ day.location }}{% else %}Tag bearbeiten{% endif %}
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body pt-3">
    <form hx-post="{% url 'travel:day_edit' day.id %}" hx-target="#modal-container" hx-swap="innerHTML">
        {% csrf_token %}
        <div class="mb-4">
            <label for="id_location" class="form-label small text-secondary text-uppercase fw-bold">Name / Ort des Tages</label>
            <input type="text" name="location" id="id_location" class="form-control bg-dark border-secondary border-opacity-25 text-light py-2" 
                   value="{{ day.location|default:'' }}" placeholder="z.B. Phuket Town" autofocus>
            <div class="form-text text-secondary small">Dieser Name erscheint im Header und im Tagebuch.</div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-dark border-secondary border-opacity-25 px-4" data-bs-dismiss="modal">Abbrechen</button>
            <button type="submit" class="btn btn-premium-teal px-4 fw-bold shadow-sm">
                <i class="bi bi-check2 me-2"></i>Speichern
            </button>
        </div>
    </form>
</div>

<style>
    .btn-premium-teal {
        background: linear-gradient(45deg, var(--accent-teal), #00a8a8);
        border: none;
        color: #fff;
        transition: all 0.3s ease;
    }
    .btn-premium-teal:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 128, 128, 0.2);
        filter: brightness(1.1);
        color: #fff;
    }
</style>
