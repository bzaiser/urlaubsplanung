{% load i18n %}
<div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark border">
        <div class="modal-header border-secondary">
            <h5 class="modal-title text-warning">
                {% if form.instance.id %}<i class="bi bi-pencil me-1"></i>{% trans "EDIT_TRIP" %}{% else %}<i class="bi bi-plus-circle me-1"></i>{% trans "NEW_TRIP" %}{% endif %}
            </h5>
            <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
        </div>
        
        <form hx-post="{{ request.path }}" 
              hx-target="#trip-overview" 
              hx-on::after-request="if(event.detail.successful) closeModal()">
            {% csrf_token %}
            
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label small text-uppercase text-secondary">{% trans "Reise-Name" %}</label>
                    <input type="text" name="name" value="{{ form.name.value|default:'' }}" required class="form-control">
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small text-uppercase text-secondary">{% trans "Startdatum" %}</label>
                        <input type="date" name="start_date" id="id_start_date" value="{{ form.start_date.value|date:'Y-m-d'|default:'' }}" required class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-uppercase text-secondary">{% trans "Enddatum" %}</label>
                        <input type="date" name="end_date" id="id_end_date" value="{{ form.end_date.value|date:'Y-m-d'|default:'' }}" required class="form-control">
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small text-uppercase text-secondary">{% trans "Basis-Währung" %}</label>
                        <input type="text" name="base_currency" value="{{ form.base_currency.value|default:'EUR' }}" class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-uppercase text-secondary">{% trans "Reisende" %}</label>
                        <input type="number" name="persons_count" value="{{ form.persons_count.value|default:2 }}" class="form-control">
                    </div>
                </div>

                <input type="hidden" name="local_currency" value="{{ form.local_currency.value|default:'THB' }}">
            </div>

            <div class="modal-footer border-secondary">
                <button type="submit" class="btn btn-warning w-100">
                    <i class="bi bi-save me-1"></i>{% trans "BTN_SAVE" %}
                </button>
            </div>
        </form>
    </div>
</div>
