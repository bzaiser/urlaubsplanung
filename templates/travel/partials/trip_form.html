{% load i18n %}
<div class="premium-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">{% if form.instance.id %}{% trans "EDIT_TRIP" %}{% else %}{% trans "NEW_TRIP" %}{% endif %}</h2>
        <button type="button" onclick="closeModal()" style="background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer;">&times;</button>
    </div>
    
    <form hx-post="{{ request.path }}" hx-target="#trip-overview" hx-on::after-request="if(event.detail.successful) closeModal()">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn-primary">
            {% trans "BTN_SAVE" %}
        </button>
    </form>
</div>
