{% load i18n %}

<style>
    /* Classic Grid Typography and Compactness (Refined) */
    .ag-theme-quartz-dark {
        --ag-font-size: 12px;
        --ag-header-font-size: 13px;
        --ag-grid-size: 6px; 
        --ag-border-radius: 2px;
        --ag-header-height: 32px;
        --ag-row-height: 30px; /* Refined for 0.77 scale */
        --ag-cell-horizontal-padding: 15px; /* Refined for 1.26 scale */
        --ag-background-color: #0d121c;
        --ag-secondary-foreground-color: var(--text-secondary);
        --ag-border-color: rgba(255, 255, 255, 0.08);
        --ag-icon-size: 13px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Standardized Type Editor - Less Flashy */
    .ag-type-editor-container {
        background: #1a2438 !important;
        border: 1px solid var(--glass-border) !important;
        border-radius: 4px; /* More classic angular look */
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        z-index: 9999;
        min-width: 160px;
    }
    
    .ag-type-editor-list {
        list-style: none;
        margin: 0;
        padding: 4px 0;
        max-height: 300px;
        overflow-y: auto;
    }
    .ag-type-editor-list li {
        padding: 8px 12px;
        cursor: pointer;
        color: #fff;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.1s;
    }
    .ag-type-editor-list li:hover {
        background: rgba(255,255,255,0.05);
        color: #fff;
    }
    .ag-type-editor-list li.selected {
        background: rgba(0, 128, 128, 0.2); /* Classic Teal for selection */
        color: #fff;
        font-weight: 700;
    }

    .btn-grid-add {
        background: rgba(26, 188, 156, 0.15) !important;
        border: 1px solid #1abc9c !important;
        color: #1abc9c !important;
        font-weight: 700 !important;
        text-shadow: 0 0 10px rgba(26, 188, 156, 0.3);
        border-radius: 4px;
        padding: 1px 8px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 15px;
    }
    .btn-grid-add:hover {
        background: var(--text-secondary) !important;
        color: #000 !important;
    }


    /* Unified Checkbox Styling */
    input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--accent-teal);
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 0.2s;
    }
    input[type="checkbox"]:hover {
        opacity: 1;
    }

    /* Event Row Indentation */
    .event-row-indent {
        padding-left: 20px !important;
    }
    .event-row-indent .ag-cell-value {
        margin-left: 4px;
    }

    /* Caret Animation */
    .caret-icon {
        display: inline-block;
        transition: transform 0.2s ease-in-out;
        margin-right: 8px;
        font-size: 10px;
        opacity: 0.7;
    }
    .station-header-grid.collapsed .caret-icon {
        transform: rotate(-90deg);
    }
    .station-header-grid {
        cursor: pointer;
        user-select: none;
    }
    .station-header-grid:hover {
        background: rgba(255, 255, 255, 0.08) !important;
    }

    /* Status Badges in Grid */
    .badge-row {
        display: flex;
        gap: 4px;
        margin-top: 2px;
        flex-wrap: wrap;
    }
    .grid-badge {
        font-size: 9px;
        padding: 1px 5px;
        border-radius: 4px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2px;
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
    }
    .badge-storno { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    .badge-storno.green { border-color: #2ecc71; color: #2ecc71; }
    .badge-storno.yellow { border-color: #f1c40f; color: #f1c40f; }
    .badge-storno.red { border-color: #e74c3c; color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
    
    .badge-pay { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    .badge-pay.open { border-color: #f1c40f; color: #f1c40f; }
    .badge-pay.paid { border-color: var(--accent-teal); color: var(--accent-teal); background: rgba(0, 128, 128, 0.1); }
</style>

<div id="ag-grid-wrapper" style="width: 100%; position: relative; overflow-x: auto; -webkit-overflow-scrolling: touch;">
    <div id="ag-trip-grid" class="ag-theme-quartz-dark" style="width: 100%; min-width: 1000px;" data-persons="{{ active_trip.persons_count|default:1 }}"></div>
    
    <!-- Data source for grid -->
    <script id="grid-data" type="application/json">
        {{ grid_data_json|safe }}
    </script>

    <script>
        (function() {
            // CRITICAL: Ensure we only initialize once per element and clean up old instances
            const gridDiv = document.querySelector('#ag-trip-grid');
            if (gridDiv && gridDiv.querySelector('.ag-root')) {
                // Already initialized or being initialized
                return;
            }
            window.collapsedStations = new Set();

            function formatCurrency(val) {
                return (val || 0).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
            }

            function updateHiddenDayIds(ids) {
                const form = document.getElementById('bulk-edit-form');
                if (!form) return;
                form.querySelectorAll('input[name="day_ids"]').forEach(i => i.remove());
                ids.forEach(id => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'day_ids';
                    input.value = id;
                    form.appendChild(input);
                });
            }

            function calculateDuration(dep, arr) {
                if (!dep || !arr) return '';
                try {
                    const [h1, m1] = dep.split(':').map(Number);
                    const [h2, m2] = arr.split(':').map(Number);
                    let d = (h2 * 60 + m2) - (h1 * 60 + m1);
                    if (d < 0) d += 24 * 60; // Next day
                    const h = Math.floor(d / 60);
                    const m = d % 60;
                    return `${h}h ${m.toString().padStart(2, '0')}m`;
                } catch(e) { return ''; }
            }

            async function syncChange(params) {
                const field = params.colDef.field;
                let val = params.newValue;
                const oldValue = params.oldValue;
                
                // Don't sync if value hasn't actually changed (prevents ghost saves on double-click)
                if (val === oldValue) return;
                
                const dayId = params.data.day_id || params.data.id;
                
                if (params.data.is_station_header) return; // Don't sync header rows

                // Live calculation for duration
                if (field === 'dep_time' || field === 'arr_time') {
                    const duration = calculateDuration(params.data.dep_time, params.data.arr_time);
                    params.node.setDataValue('duration', duration);
                }

                let url = '';
                let formData = new FormData();
                formData.append('value', val);

                if (field === 'location' && params.data.is_day_header) {
                    url = `/day/${dayId}/inline-update/`;
                } else {
                    const eventId = params.data.id;
                    url = `/event/${eventId}/inline-update/`;
                    
                    const fieldMapping = {
                        'dep_time': 'time',
                        'arr_time': 'end_time',
                        'flight_no': 'detail_info',
                        'hotel_title': 'hotel_title',
                        'location': 'location',
                        'meals_info': 'meals_info',
                        'cost_booked': 'cost_booked',
                        'cost_estimated': 'cost_estimated',
                        'cost_per_person': 'cost_per_person',
                        'cost_total': 'cost_total',
                        'activities_info': 'activities_info',
                        'booking_via': 'booking_via',
                        'is_paid': 'is_paid',
                        'type': 'type',
                        'title': 'title'
                    };
                    
                    const djangoField = fieldMapping[field] || field;
                    formData.append('field', djangoField);
                }

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': '{{ csrf_token }}'
                        }
                    });
                    
                    if (response.ok) {
                        showToast("✓ Gespeichert");
                        
                        if (field === 'dep_time' || field === 'arr_time') {
                            const text = await response.text();
                            if (text.includes('id="duration')) {
                                const temp = document.createElement('div');
                                temp.innerHTML = text;
                                const durationCell = temp.querySelector('td');
                                if (durationCell) {
                                    params.node.setDataValue('duration', durationCell.innerText.trim());
                                }
                            }
                        }
                    } else {
                        showToast("⚠️ Fehler beim Speichern", true);
                        console.error("Save failed:", response.statusText);
                    }
                } catch (err) {
                    console.error('Save failed:', err);
                    showToast("⚠️ Netzwerkfehler", true);
                }
            }

            function timeParser(params) {
                let val = params.newValue;
                if (!val) return val;
                val = val.toString().trim().replace('.', ':'); // Allow . instead of :
                
                // Case: "10" or "8"
                if (/^\d{1,2}$/.test(val)) {
                    let h = parseInt(val);
                    if (h >= 0 && h <= 23) {
                        return h.toString().padStart(2, '0') + ':00';
                    }
                }
                // Case: "1030" or "830"
                if (/^\d{3,4}$/.test(val)) {
                    let h = val.length === 3 ? val.substring(0, 1) : val.substring(0, 2);
                    let m = val.length === 3 ? val.substring(1, 3) : val.substring(2, 4);
                    return h.padStart(2, '0') + ':' + m.padStart(2, '0');
                }
                return val;
            }

            class TypeCellEditor {
                init(params) {
                    this.container = document.createElement('div');
                    this.container.className = 'ag-type-editor-container';
                    
                    const map = {
                        'NONE': '➖', 'FLIGHT': '✈️', 'HOTEL': '🏨', 'CAMPING': '⛺',
                        'PITCH': '🚐📍', 'BUNGALOW': '🏡', 'CAMPER': '🚐',
                        'CAR': '🚗', 'RENTAL_CAR': '🔑🚗', 'SCOOTER': '🛵', 'BOAT': '🛥️', 'FERRY': '⛴️',
                        'TAXI': '🚕', 'BUS': '🚌',
                        'TRAIN': '🚆🚌', 'ACTIVITY': '🎒', 'RESTAURANT': '🍽️', 'OTHER': '❓',
                        'FOOD': '🍕', 'FEE': '🎟️', 'RENTAL': '🛴'
                    };
                    const labels = {
                        'NONE': '---', 'FLIGHT': 'Flug', 'HOTEL': 'Hotel', 'CAMPING': 'Camping',
                        'PITCH': 'Stellplatz', 'BUNGALOW': 'Bungalow', 'CAMPER': 'Wohnmobil',
                        'CAR': 'Auto', 'RENTAL_CAR': 'Mietwagen', 'SCOOTER': 'Roller', 'BOAT': 'Boot', 'FERRY': 'Fähre',
                        'TAXI': 'Taxi', 'BUS': 'Bus',
                        'TRAIN': 'Zug / Bus', 'ACTIVITY': 'Aktivität', 'RESTAURANT': 'Essen', 'OTHER': 'Sonstiges',
                        'FOOD': 'Verpflegung', 'FEE': 'Gebühr', 'RENTAL': 'Miete'
                    };
                    
                    const list = document.createElement('ul');
                    list.className = 'ag-type-editor-list';
                    
                    Object.keys(labels).forEach(key => {
                        const li = document.createElement('li');
                        li.innerHTML = `<span>${map[key]}</span> ${labels[key]}`;
                        li.onclick = () => {
                            this.value = key;
                            params.stopEditing();
                        };
                        if (key === params.value) li.classList.add('selected');
                        list.appendChild(li);
                    });
                    
                    this.container.appendChild(list);
                    this.value = params.value;
                }
                
                getGui() { return this.container; }
                afterGuiAttached() { 
                    this.container.focus(); 
                    // Scroll to selected
                    const selected = this.container.querySelector('.selected');
                    if (selected) selected.scrollIntoView({ block: 'center' });
                }
                getValue() { return this.value; }
                isPopup() { return true; }
            }

            const initGrid = () => {
                const gridDiv = document.querySelector('#ag-trip-grid');
                if (!gridDiv) return;

                const dataEl = document.getElementById('grid-data');
                if (!dataEl) return;
                
                const rowData = JSON.parse(dataEl.textContent);
                const columnDefs = [
                    { headerName: '', checkboxSelection: true, headerCheckboxSelection: true, width: 40, pinned: 'left' },
                    { 
                        headerName: 'Datum', 
                        field: 'date_display', 
                        width: 0, 
                        hide: true // User requested to hide this as it's in the day header
                    },
                    { 
                        headerName: 'Ort', 
                        field: 'location', 
                        width: 140, 
                        editable: params => params.node.rowPinned !== 'bottom',
                        headerTooltip: 'Zielort der Reiseetappe', 
                        cellClass: 'event-row-indent'
                    },
                    { 
                        headerName: 'Typ', 
                        field: 'type', 
                        width: 65, 
                        editable: true,
                        headerTooltip: 'Art des Events (Flug, Hotel, etc.)',
                        cellEditor: TypeCellEditor,
                        cellRenderer: p => {
                            const map = {
                                'NONE': '➖', 'FLIGHT': '✈️', 'HOTEL': '🏨', 'CAMPING': '⛺',
                                'PITCH': '🚐📍', 'BUNGALOW': '🏡', 'CAMPER': '🚐',
                                'CAR': '🚗', 'RENTAL_CAR': '🔑🚗', 'SCOOTER': '🛵', 'BOAT': '🛥️', 'FERRY': '⛴️',
                                'TAXI': '🚕', 'BUS': '🚌',
                                'TRAIN': '🚆🚌', 'ACTIVITY': '🎒', 'RESTAURANT': '🍽️', 'OTHER': '❓',
                                'FOOD': '🍕', 'FEE': '🎟️', 'RENTAL': '🛴'
                            };
                            const labels = {
                                'NONE': '---', 'FLIGHT': 'Flug', 'HOTEL': 'Hotel', 'CAMPING': 'Camping',
                                'PITCH': 'Stellplatz', 'BUNGALOW': 'Bungalow', 'CAMPER': 'Wohnmobil',
                                'CAR': 'Auto', 'RENTAL_CAR': 'Mietwagen', 'SCOOTER': 'Roller', 'BOAT': 'Boot', 'FERRY': 'Fähre',
                                'TAXI': 'Taxi', 'BUS': 'Bus',
                                'TRAIN': 'Zug / Bus', 'ACTIVITY': 'Aktivität', 'RESTAURANT': 'Essen', 'OTHER': 'Sonstiges',
                                'FOOD': 'Verpflegung', 'FEE': 'Gebühr', 'RENTAL': 'Miete'
                            };
                            if (!p.value || p.value === 'NONE') return '';
                            return `<span title="${labels[p.value] || ''}">${map[p.value] || ''}</span>`;
                        }
                    },
                    { 
                        headerName: 'Info', 
                        field: 'title', 
                        width: 220, // Slightly wider for badges
                        autoHeight: true,
                        wrapText: true,
                        headerTooltip: 'Titel & Status (Storno/Zahlung)',
                        cellStyle: { 'display': 'flex', 'flex-direction': 'column', 'justify-content': 'center', 'padding-top': '4px', 'padding-bottom': '4px' },
                        cellRenderer: p => {
                            if (p.node.rowPinned === 'bottom') return '';
                            if (!p.data) return p.value;
                            if (p.data.is_day_header || p.data.is_station_header) return p.value;
                            
                            const d = p.data;
                            if (d.is_global_expense) {
                                let gHtml = `<div style="font-weight: 700; color: var(--accent-gold);">${d.title || ''}</div>`;
                                gHtml += `<div style="font-size: 0.75rem; opacity: 0.8; color: var(--text-secondary);">${d.units} x ${formatCurrency(d.unit_price)}</div>`;
                                return gHtml;
                            }

                            let html = `<div style="font-weight: 600; line-height: 1.2;">${d.title || ''}`;
                            if (d.nights && d.is_checkin) {
                                html += ` <span style="background: var(--accent-teal); color: #fff; font-size: 8px; padding: 1px 4px; border-radius: 3px; margin-left: 5px;">${d.nights} NÄCHTE</span>`;
                            }
                            html += '</div>';
                            
                            html += '<div class="badge-row">';
                            
                            // Cancellation Badge
                            if (d.cancellation_deadline) {
                                let colorClass = 'green';
                                if (d.days_until_storno <= 3) colorClass = 'red';
                                else if (d.days_until_storno <= 10) colorClass = 'yellow';
                                html += `<span class="grid-badge badge-storno ${colorClass}">⌛ Storno: ${d.cancellation_deadline}</span>`;
                            }
                            
                            // Payment Badge
                            if (d.cost_booked > 0 || d.amount_paid > 0) {
                                const isFullyPaid = d.is_paid || (d.amount_paid >= d.cost_booked);
                                const colorClass = isFullyPaid ? 'paid' : 'open';
                                const method = d.payment_method ? d.payment_method : '';
                                const amountInfo = d.amount_paid < d.cost_booked ? `${d.amount_paid}/${d.cost_booked}€` : `${d.cost_booked}€`;
                                html += `<span class="grid-badge badge-pay ${colorClass}">${method} ${amountInfo}</span>`;
                            } else if (d.payment_method) {
                                html += `<span class="grid-badge badge-pay open">${d.payment_method} 0€</span>`;
                            }
                            
                            if (d.breakfast_included) {
                                html += `<span class="grid-badge" style="background: rgba(0, 128, 128, 0.1); border: 1px solid var(--accent-teal); color: var(--accent-teal);">🥐 Inkl.</span>`;
                            } else if (d.breakfast_cost > 0) {
                                html += `<span class="grid-badge" style="background: rgba(0, 128, 128, 0.1); border: 1px solid var(--accent-teal); color: var(--accent-teal);">☕ ${formatCurrency(d.breakfast_cost)}</span>`;
                            }
                            
                            html += '</div>';
                            return html;
                        }
                    },
                    { headerName: 'Start', field: 'dep_time', width: 65, editable: true, valueParser: p => timeParser(p), headerTooltip: 'Voraussichtlicher Beginn / Abfahrt', cellClass: 'text-center font-monospace' },
                    { headerName: 'Ende', field: 'arr_time', width: 65, editable: true, valueParser: p => timeParser(p), headerTooltip: 'Voraussichtliches Ende / Ankunft', cellClass: 'text-center font-monospace' },
                    { headerName: 'Dauer', field: 'duration', width: 85, cellClass: 'text-center opacity-75', headerTooltip: 'Berechnete Dauer der Etappe' },
                    { headerName: 'km', field: 'distance_km', width: 65, editable: true, headerTooltip: 'Entfernung in Kilometern', cellClass: 'text-center font-monospace text-teal' },
                    { 
                        headerName: 'Schätz.', 
                        field: 'cost_estimated', 
                        width: 90, 
                        editable: params => !params.data.is_checkout, 
                        valueFormatter: p => formatCurrency(p.value), 
                        headerTooltip: 'Voraussichtliche / Kalkulierte Kosten', 
                        cellClass: p => 'text-end font-monospace ' + (p.data.is_checkout ? 'opacity-25' : 'opacity-75')
                    },
                    { 
                        headerName: 'Gebucht', 
                        field: 'cost_booked', 
                        width: 90, 
                        editable: params => !params.data.is_checkout, 
                        valueFormatter: p => formatCurrency(p.value), 
                        headerTooltip: 'Bereits fix gebuchter Preis', 
                        cellClass: p => 'text-end font-monospace ' + (p.data.is_checkout ? 'opacity-25' : 'text-teal')
                    },
                    { 
                        headerName: 'Beleg', 
                        width: 80, 
                        headerTooltip: 'Anhänge, Dokumente & Löschen',
                        cellClass: 'text-center',
                        cellRenderer: p => {
                            if (!p.data || p.data.is_station_header || p.data.is_day_header) return '';
                            let h = '<div style="display: flex; gap: 8px; justify-content: center; align-items: center; height: 100%;">';
                            
                            // Consistent width for voucher icon
                            if (p.data.voucher_url) {
                                h += `<a href="${p.data.voucher_url}" target="_blank" style="text-decoration: none; font-size: 1rem;">📄</a>`;
                            } else {
                                h += `<span style="opacity: 0.15; cursor: default; font-size: 1rem;" title="Kein Beleg vorhanden">📄</span>`;
                            }
                            
                            h += `<button onclick="triggerUpload('${p.data.id}')" style="background: none; border: none; cursor: pointer; padding: 0; font-size: 1rem;" title="Upload">📤</button>`;
                            
                            if (p.data.is_global_expense) {
                                h += `<button onclick="deleteGlobalExpense('${p.data.id.replace('global-', '')}')" style="background: none; border: none; cursor: pointer; padding: 0; font-size: 1rem; opacity: 0.5;" title="Löschen">🗑️</button>`;
                            } else {
                                h += `<button onclick="deleteSingleEvent('${p.data.id}')" style="background: none; border: none; cursor: pointer; padding: 0; font-size: 1rem; opacity: 0.5;" title="Löschen">🗑️</button>`;
                            }
                            h += '</div>';
                            return h;
                        }
                    }
                ];

                const gridOptions = {
                    rowData: rowData,
                    columnDefs: columnDefs,
                    defaultColDef: { 
                        sortable: true, 
                        filter: true, 
                        resizable: true,
                        editable: params => !params.data.is_global_expense,
                        singleClickEdit: true,
                        tooltipComponent: null 
                    },
                    rowSelection: 'multiple',
                    suppressRowClickSelection: true,
                    tooltipShowDelay: 100,
                    domLayout: 'autoHeight',
                    pinnedBottomRowData: [],
                    isFullWidthRow: (params) => (params.rowNode.data.is_station_header || params.rowNode.data.is_day_header) && params.rowNode.rowPinned !== 'bottom',
                    fullWidthCellRenderer: (params) => {
                        const d = params.data;
                        if (d.station_key === 'global') {
                            return `<div class="station-header-grid" 
                                         style="padding: 0 15px; background: rgba(197, 160, 89, 0.1); border-left: 4px solid var(--accent-gold); color: var(--accent-gold); font-weight: 700; height: 100%; display: flex; align-items: center; justify-content: space-between; font-size: 0.95rem;">
                                <span>📦 PAUSCHALE POSTEN / BUDGET</span>
                                <button onclick="htmx.ajax('GET', '/trip/{{ active_trip.id }}/expense/new/', { target: '#modal-container', swap: 'innerHTML' })" class="btn-grid-add" style="border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(197, 160, 89, 0.1);">➕ BUDGET</button>
                            </div>`;
                        } else if (d.is_station_header) {
                            const isCollapsed = window.collapsedStations.has(d.station_key);
                            const icon = isCollapsed ? '▼' : '▼'; // We rotate the same icon with CSS
                            return `<div class="station-header-grid ${isCollapsed ? 'collapsed' : ''}" 
                                         onclick="window.toggleStation('${d.station_key}')"
                                         style="padding: 0 15px; background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--accent-teal); color: var(--accent-teal); font-weight: 600; height: 100%; display: flex; align-items: center; font-size: 0.95rem;">
                                <span class="caret-icon">▼</span>
                                📍 ${d.station_location} (${d.days_count} Tage / ${d.nights_count} Nächte)
                            </div>`;
                        } else if (d.is_day_header) {
                            const isSelected = params.node.isSelected();
                            
                            return `<div class="day-header-grid" style="padding: 0; background: rgba(255, 255, 255, 0.12); border-bottom: 1px solid rgba(255,255,255,0.08); color: var(--text-primary); height: 100%; display: flex; align-items: center; justify-content: space-between;">
                                <div style="display: flex; align-items: center; height: 100%;">
                                    <div style="width: 40px; display: flex; justify-content: center; align-items: center;">
                                        <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="window.agGridApi.getRowNode('${d.id}').setSelected(this.checked)">
                                    </div>
                                    <div style="padding-left: 0px; display: flex; align-items: center;">
                                        <span style="font-weight: 700; min-width: 90px; color: var(--text-primary);">📅 ${d.date_display}</span>
                                        <span style="font-size: 0.8rem; opacity: 0.6; margin-left: 10px; width: 40px;">${d.day_name}</span>
                                    </div>
                                </div>
                                <button onclick="htmx.ajax('GET', '/day/${d.day_id}/event/type-picker/', { target: '#modal-container', swap: 'innerHTML' })" class="btn-grid-add">➕ EINTRAG</button>
                            </div>`;
                        }
                    },
                    getRowHeight: (params) => {
                        if (params.data.is_station_header) return 32;
                        if (params.data.is_day_header) return 28;
                        // Determine if it has badges
                        if (!params.data.is_day_header && (params.data.cancellation_deadline || params.data.payment_method || params.data.cost_booked > 0)) {
                            return 42; // Taller for badges
                        }
                        return 30; 
                    },
                    onCellDoubleClicked: (params) => {
                        if (params.data && !params.data.is_day_header && !params.data.is_station_header) {
                            try {
                                // IMPORTANT: Cancel the single-click edit that started
                                params.api.stopEditing(true);
                                
                                const eventId = params.data.id;
                                if (!eventId) return;

                                if (params.data.is_global_expense) {
                                    const cleanId = eventId.toString().replace('global-', '');
                                    htmx.ajax('GET', `/expense/${cleanId}/edit/`, { target: '#modal-container', swap: 'innerHTML' });
                                } else if (!isNaN(eventId)) {
                                    htmx.ajax('GET', `/event/${eventId}/edit/`, { target: '#modal-container', swap: 'innerHTML' });
                                }
                            } catch (err) {
                                console.error('Double-click handler failed', err);
                            }
                        }
                    },
                    getRowId: (params) => params.data.id,
                    onGridReady: (p) => {
                        window.agGridApi = p.api;
                        updateSummary();
                    },
                    onSelectionChanged: (p) => {
                        const selectedRows = p.api.getSelectedRows();
                        updateBulkToolbar(selectedRows);
                    },
                    onCellValueChanged: p => {
                        syncChange(p);
                        updateSummary();
                    },
                    isExternalFilterPresent: () => window.collapsedStations.size > 0,
                    doesExternalFilterPass: (node) => {
                        if (node.data.is_station_header) return true;
                        return !window.collapsedStations.has(node.data.station_key);
                    }
                };

                const api = agGrid.createGrid(gridDiv, gridOptions);
                window.agGridApi = api; // Use returned API instance
                
                window.toggleStation = (key) => {
                    if (window.collapsedStations.has(key)) {
                        window.collapsedStations.delete(key);
                    } else {
                        window.collapsedStations.add(key);
                    }
                    window.agGridApi.onFilterChanged();
                };
            };

            window.updateBulkToolbar = function(selectedRows) {
                const toolbar = document.getElementById('bulk-toolbar');
                const countEl = document.getElementById('selection-count');
                const labelEl = document.getElementById('selection-label');
                const dayTools = document.getElementById('day-specific-tools');
                const eventTools = document.getElementById('event-specific-tools');
                
                if (!toolbar) return;

                if (selectedRows.length === 0) {
                    toolbar.classList.add('bulk-toolbar-hidden');
                    toolbar.classList.remove('bulk-toolbar-show');
                    return;
                }

                toolbar.classList.remove('bulk-toolbar-hidden');
                toolbar.classList.add('bulk-toolbar-show');
                countEl.innerText = selectedRows.length;

                // Check Types of selection
                const hasDays = selectedRows.some(r => r.is_day_header);
                const hasEvents = selectedRows.some(r => !r.is_day_header && !r.is_station_header);

                if (hasDays) {
                    // Prioritize Day Tools if any days are selected
                    labelEl.innerText = '{% trans "TAGE AUSGEWÄHLT" %}';
                    if (dayTools) dayTools.style.display = 'flex';
                    if (eventTools) eventTools.style.display = 'none';
                    // Collect all involved day IDs (from days or events)
                    const dayIds = [...new Set(selectedRows.map(r => r.day_id))].filter(id => id !== undefined);
                    updateHiddenIds(dayIds, 'day_ids');
                } else {
                    labelEl.innerText = 'EINTRÄGE AUSGEWÄHLT';
                    if (dayTools) dayTools.style.display = 'none';
                    if (eventTools) eventTools.style.display = 'flex';
                    updateHiddenIds(selectedRows.map(r => r.id), 'event_ids');
                }
            };

            function updateHiddenIds(ids, name) {
                const dayForm = document.getElementById('bulk-edit-form');
                const eventForm = document.getElementById('event-bulk-form');
                
                [dayForm, eventForm].forEach(f => {
                    if (!f) return;
                    // CRITICAL: Clear BOTH types of IDs to prevent cross-form pollution
                    f.querySelectorAll('input[name="day_ids"], input[name="event_ids"]').forEach(i => i.remove());
                    
                    ids.forEach(id => {
                        if (id === undefined || id === null) return;
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = name;
                        input.value = id;
                        f.appendChild(input);
                    });
                });
            }

            window.deleteSingleEvent = function(eventId) {
                if (!confirm('Eintrag wirklich löschen?')) return;
                const csrftoken = window.getCookie('csrftoken') || '{{ csrf_token }}';
                fetch(`/event/${eventId}/delete/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': csrftoken }
                }).then(response => {
                    if (response.ok) {
                        // Remove from grid immediately for snappy UX
                        if (window.agGridApi) {
                            const rowNode = window.agGridApi.getRowNode(eventId);
                            if (rowNode) {
                                window.agGridApi.applyTransaction({ remove: [rowNode.data] });
                            }
                        }
                        showToast("🗑️ Gelöscht");
                        updateSummary();
                    } else {
                        console.error('Löschen fehlgeschlagen');
                        showToast("⚠️ Fehler beim Löschen");
                    }
                });
            };

            window.deleteGlobalExpense = function(expenseId) {
                if (!confirm('Diese pauschale Ausgabe wirklich löschen?')) return;
                const csrftoken = window.getCookie('csrftoken') || '{{ csrf_token }}';
                fetch(`/expense/${expenseId}/delete/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': csrftoken }
                }).then(response => {
                    if (response.ok) {
                        if (window.agGridApi) {
                            const rowNode = window.agGridApi.getRowNode('global-' + expenseId);
                            if (rowNode) {
                                window.agGridApi.applyTransaction({ remove: [rowNode.data] });
                            }
                        }
                        showToast("🗑️ Gelöscht");
                        updateSummary();
                    }
                });
            };

            window.getCookie = function(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            };


            window.triggerUpload = function(rowId) {
                const input = document.createElement('input');
                input.type = 'file';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const formData = new FormData();
                    formData.append('voucher', file);
                    
                    const isGlobal = String(rowId).startsWith('global-');
                    const cleanId = isGlobal ? rowId.replace('global-', '') : rowId;
                    const url = isGlobal ? `/expense/${cleanId}/upload-voucher/` : `/event/${cleanId}/upload-voucher/`;

                    const csrftoken = window.getCookie('csrftoken') || '{{ csrf_token }}';
                    fetch(url, {
                        method: 'POST',
                        headers: { 'X-CSRFToken': csrftoken },
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // Update the grid data locally
                            const rowNode = window.agGridApi.getRowNode(rowId);
                            if (rowNode) {
                                rowNode.setDataValue('voucher_url', data.voucher_url);
                                showToast('✓ Beleg hochgeladen');
                            }
                        }
                    });
                };
                input.click();
            };

            function updateSummary() {
                if (!window.agGridApi) return;
                let totalBooked = 0;
                let totalEstimated = 0;
                let totalKm = 0;
                const personCount = parseInt(document.getElementById('ag-trip-grid').dataset.persons) || 1;

                window.agGridApi.forEachNode(node => {
                    if (node.data && !node.data.is_station_header && !node.data.is_day_header && !node.rowPinned) {
                        totalBooked += parseFloat(node.data.cost_booked) || 0;
                        totalEstimated += parseFloat(node.data.cost_estimated) || 0;
                        totalKm += parseFloat(node.data.distance_km) || 0;
                    }
                });

                const total = totalBooked + totalEstimated;

                if (window.agGridApi) {
                    const pinnedData = [
                        {
                            location: 'SUMME REISE',
                            title: `Gesamt (PP: ${formatCurrency(total / personCount)})`,
                            cost_booked: totalBooked,
                            cost_estimated: totalEstimated,
                            distance_km: totalKm.toFixed(0)
                        }
                    ];
                    window.agGridApi.setPinnedBottomRowData(pinnedData);
                }
            }

            // Simple initialization on load
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                initGrid();
            } else {
                document.addEventListener('DOMContentLoaded', initGrid);
            }
        })();

        // Global functions for the toolbar (connecting back to AG Grid)
        function clearSelection() {
            if (window.agGridApi) {
                window.agGridApi.deselectAll();
            }
        }
    </script>

    <!-- Floating Toolbar (Dynamic for Days or Events) -->
    <div id="bulk-toolbar" class="bulk-toolbar-hidden" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(10, 25, 47, 0.95); backdrop-filter: blur(20px); border: 2px solid var(--accent-gold); padding: 12px 30px; border-radius: 60px; display: flex; gap: 20px; align-items: center; z-index: 9999; box-shadow: 0 15px 50px rgba(0,0,0,0.6); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <span style="color: var(--accent-gold); font-weight: 600; white-space: nowrap;"><span id="selection-count">0</span> <span id="selection-label">{% trans "TAGE AUSGEWÄHLT" %}</span></span>
        <div style="height: 30px; width: 1px; background: rgba(255,255,255,0.2);"></div>
        
        <!-- Day Specific Tools (Station Setting) -->
        <form id="bulk-edit-form" 
              hx-post="{% url 'travel:day_bulk_edit' %}?view=table" 
              hx-target="body" 
              hx-on::after-request="this.reset(); clearSelection();"
              style="display: flex; gap: 10px; align-items: center;">
            <div id="day-specific-tools" style="display: flex; gap: 10px; align-items: center;">
                <input type="text" name="location" placeholder="Station / Ort" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; padding: 8px 15px; border-radius: 20px; outline: none; width: 180px; font-size: 0.85rem;">
                <button type="submit" class="btn-primary" style="padding: 8px 25px; font-size: 0.8rem; margin: 0; border-radius: 20px; width: auto;">STATION SETZEN</button>
            </div>
        </form>

        <!-- Event Specific Tools (Move/Delete) -->
        <form id="event-bulk-form" 
              style="display: none; gap: 10px; align-items: center;">
            <div id="event-specific-tools" style="display: flex; gap: 10px; align-items: center;">
                <input type="date" name="target_date" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; padding: 8px 15px; border-radius: 20px; outline: none; width: 140px; font-size: 0.85rem;">
                <button type="button" 
                        hx-post="{% url 'travel:event_bulk_move' %}" 
                        hx-target="body" 
                        hx-include="[name='event_ids'], [name='target_date']"
                        hx-on::after-request="clearSelection();"
                        class="btn-primary" style="padding: 8px 20px; font-size: 0.8rem; margin: 0; border-radius: 20px; width: auto;">VERSCHIEBEN</button>
                <button type="button" 
                        hx-post="{% url 'travel:event_bulk_delete' %}" 
                        hx-target="body" 
                        hx-include="[name='event_ids']"
                        hx-confirm="Markierte Einträge wirklich löschen?"
                        hx-on::after-request="clearSelection();"
                        style="background: #e74c3c; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; font-weight: bold; transition: background 0.2s;" onmouseover="this.style.background='#c0392b'" onmouseout="this.style.background='#e74c3c'">LÖSCHEN</button>
            </div>
        </form>

        <button type="button" onclick="clearSelection()" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.5rem;">&times;</button>
    </div>

    <style>
        .bulk-toolbar-hidden {
            opacity: 0;
            bottom: -120px !important;
            pointer-events: none;
            transform: translateX(-50%) scale(0.9) !important;
        }
        .bulk-toolbar-show {
            opacity: 1;
            bottom: 30px !important;
            transform: translateX(-50%) scale(1) !important;
        }
        .ag-theme-thailand-gold .ag-row-selected {
            background-color: rgba(197, 160, 89, 0.15) !important;
        }
    </style>

</div>
