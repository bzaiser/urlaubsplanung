{% load i18n %}
<div class="card bg-dark border-info mb-3">
    <div class="card-header border-secondary">
        <h6 class="mb-0 text-info">
            {% if template %}<i class="bi bi-pencil me-1"></i>{% trans "Vorlage bearbeiten" %}{% else %}<i class="bi bi-plus-circle me-1"></i>{% trans "Neue Vorlage erstellen" %}{% endif %}
        </h6>
    </div>
    <div class="card-body">
        <form hx-post="{% if template %}{% url 'travel:template_edit' template.id %}{% else %}{% url 'travel:template_create' %}{% endif %}" 
              hx-target="#modal-container" hx-swap="innerHTML">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small text-uppercase text-secondary">{% trans "Name der Vorlage" %}</label>
                <input type="text" name="name" value="{{ template.name|default:'' }}" required placeholder="z.B. Thailand 4 Wochen" class="form-control form-control-sm">
            </div>
            <div class="mb-3">
                <label class="form-label small text-uppercase text-secondary">{% trans "Deine Vorlieben" %}</label>
                <textarea name="preferences" rows="8" required placeholder="Beschreibe hier, wie du reist..." class="form-control form-control-sm">{{ template.preferences }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning flex-grow-1">
                    <i class="bi bi-save me-1"></i>Speichern
                </button>
                <button type="button" class="btn btn-outline-secondary" onclick="document.getElementById('template-form-area').innerHTML=''">Abbrechen</button>
            </div>
        </form>
    </div>
</div>
