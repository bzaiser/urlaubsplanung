{% load i18n %}
<div id="trip-switcher-container" hx-swap-oob="true" class="d-flex align-items-center gap-2">
    {% if trips %}
    <div class="d-flex align-items-center gap-2">
        <select onchange="window.location.href='?trip_id=' + this.value" 
                class="form-select form-select-sm bg-dark text-warning border-secondary rounded-pill">
            {% if not active_trip %}
            <option value="" disabled selected>--- Eine vorhandene Reise auswählen ---</option>
            {% endif %}
            {% for trip in trips %}
            <option value="{{ trip.id }}" {% if active_trip and trip.id == active_trip.id %}selected{% endif %}>{{ trip.name }}</option>
            {% endfor %}
        </select>
    </div>
    {% else %}
    <span class="fw-bold text-warning pe-2">
        {% trans "TRAVEL_HUB_NAME" %}
    </span>
    {% endif %}
    
    <button hx-get="{% url 'travel:ai_wizard' %}?step=select" 
            hx-target="#modal-container"
            class="btn btn-sm btn-premium-gold px-2 px-md-3 shadow-sm"
            title="KI-Reise-Designer öffnen">
        <i class="bi bi-stars"></i>
        <span class="d-none d-md-inline">KI-Designer</span>
    </button>

    {% if active_trip %}
    <button class="btn btn-sm btn-outline-warning rounded-pill px-2 px-md-3 shadow-sm" 
            type="button"
            data-bs-toggle="offcanvas" 
            data-bs-target="#offcanvasRouteMap" 
            aria-controls="offcanvasRouteMap">
        <i class="bi bi-map-fill me-1"></i>{% trans "Route" %}
    </button>
    {% endif %}

    <button hx-get="{% url 'travel:trip_create' %}" 
            hx-target="#modal-container"
            class="btn btn-sm btn-outline-warning px-2 px-md-3 shadow-sm rounded-pill"
            title="Neue Reise anlegen">
        <i class="bi bi-plus-lg"></i>
        <span class="d-none d-md-inline">Neue Reise</span>
    </button>
</div>
