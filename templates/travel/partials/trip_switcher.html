{% load i18n %}
<div id="trip-switcher-container" hx-swap-oob="true" style="display: flex; align-items: center; gap: 15px;">
    {% if trips %}
    <div style="position: relative; display: flex; align-items: center; gap: 10px;">
        <select onchange="window.location.href='?trip_id=' + this.value" 
                style="background: rgba(10, 25, 47, 0.6); color: var(--accent-gold); border: 1px solid var(--glass-border); border-radius: 20px; padding: 5px 35px 5px 15px; font-family: 'Outfit', sans-serif; font-size: 1.1rem; appearance: none; cursor: pointer; outline: none; transition: all 0.3s;"
                onmouseover="this.style.borderColor='var(--accent-gold)'"
                onmouseout="this.style.borderColor='var(--glass-border)'">
            {% if not active_trip %}
            <option value="" disabled selected>--- Eine vorhandene Reise auswählen ---</option>
            {% endif %}
            {% for trip in trips %}
            <option value="{{ trip.id }}" {% if active_trip and trip.id == active_trip.id %}selected{% endif %}>{{ trip.name }}</option>
            {% endfor %}
        </select>
        <div style="position: absolute; right: 15px; pointer-events: none; color: var(--accent-gold); font-size: 0.8rem;">▼</div>
    </div>
    
    {% if active_trip %}
    <button hx-delete="{% url 'travel:trip_delete' active_trip.id %}"
            hx-target="#dashboard-refresh"
            hx-confirm="Willst du die Reise '{{ active_trip.name }}' wirklich komplett löschen?"
            style="background: rgba(231, 76, 60, 0.2); color: #ff7675; border: 1px solid rgba(231, 76, 60, 0.5); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; transition: all 0.2s;"
            onmouseover="this.style.background='rgba(231, 76, 60, 0.4)'"
            onmouseout="this.style.background='rgba(231, 76, 60, 0.2)'"
            title="Aktuelle Reise löschen">
        🗑️
    </button>
    {% endif %}
    
    {% else %}
    <span style="font-family: 'Outfit', sans-serif; font-size: 1.2rem; color: var(--accent-gold);">
        {% trans "TRAVEL_HUB_NAME" %}
    </span>
    {% endif %}

    <button hx-get="{% url 'travel:ai_wizard' %}?step=select" 
            hx-target="#modal-container"
            style="background: linear-gradient(135deg, #c5a059 0%, #177070 100%); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; margin-right: 5px;"
            onmouseover="this.style.transform='scale(1.1)';"
            onmouseout="this.style.transform='scale(1)';"
            title="KI-Reise-Designer öffnen">
        ✨
    </button>
    <button hx-get="{% url 'travel:trip_create' %}" 
            hx-target="#modal-container"
            style="background: rgba(197, 160, 89, 0.2); color: var(--accent-gold); border: 1px solid var(--accent-gold); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: all 0.2s;"
            onmouseover="this.style.background='var(--accent-gold)'; this.style.color='#000';"
            onmouseout="this.style.background='rgba(197, 160, 89, 0.2)'; this.style.color='var(--accent-gold)';"
            title="Neue Reise anlegen">
        +
    </button>
</div>
