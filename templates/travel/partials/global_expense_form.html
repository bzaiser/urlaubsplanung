{% load i18n %}
<div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark border">
        <div class="modal-header border-secondary">
            <h5 class="modal-title text-warning">📦 Pauschale / Budget hinzufügen</h5>
            <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
        </div>

        <form hx-post="{{ request.path }}" 
              hx-target="#trip-overview" 
              hx-on::after-request="if(event.detail.successful) closeModal()">
            {% csrf_token %}
            
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label small text-uppercase text-secondary">Titel</label>
                    <input type="text" name="title" value="{{ expense.title|default:'' }}" placeholder="z.B. Roller-Miete, Nationalpark-Pass" required class="form-control">
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small text-uppercase text-secondary">Typ</label>
                        <select name="expense_type" class="form-select">
                            <option value="FOOD" {% if expense.expense_type == 'FOOD' %}selected{% endif %}>🍟 Verpflegung</option>
                            <option value="RENTAL" {% if expense.expense_type == 'RENTAL' %}selected{% endif %}>🛴 Miete</option>
                            <option value="FEE" {% if expense.expense_type == 'FEE' %}selected{% endif %}>🎟️ Eintritt/Gebühr</option>
                            <option value="OTHER" {% if not expense.expense_type or expense.expense_type == 'OTHER' %}selected{% endif %}>📦 Sonstiges</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-uppercase text-secondary">Anzahl (z.B. Tage)</label>
                        <input type="number" name="units" value="{{ expense.units|default:1 }}" min="1" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-uppercase text-secondary">Preis pro Einheit (in €)</label>
                    <div class="input-group">
                        <input type="number" step="0.01" name="unit_price" value="{{ expense.unit_price|stringformat:'.2f'|default:'0.00' }}" class="form-control">
                        <span class="input-group-text">€</span>
                    </div>
                </div>
            </div>

            <div class="modal-footer border-secondary">
                <button type="submit" class="btn btn-warning w-100">
                    <i class="bi bi-save me-1"></i>SPEICHERN
                </button>
            </div>
        </form>
    </div>
</div>
