{% load i18n %}
<div class="modal-dialog">
    <div class="modal-content" style="border: 1px solid var(--accent-gold); padding: 15px; background: var(--card-bg); border-radius: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">
            <h2 style="margin: 0; font-family: 'Outfit', sans-serif; color: var(--accent-gold); font-size: 1rem; text-transform: uppercase;">
                📦 Pauschale / Budget hinzufügen
            </h2>
            <button type="button" onclick="closeModal()" style="background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer;">&times;</button>
        </div>

        <form hx-post="{{ request.path }}" 
              hx-target="#trip-overview" 
              hx-on::after-request="if(event.detail.successful) closeModal()"
              style="display: flex; flex-direction: column; gap: 12px;">
            {% csrf_token %}
            
            <div>
                <label style="display: block; color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase;">Titel</label>
                <input type="text" name="title" placeholder="z.B. Roller-Miete, Nationalpark-Pass" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label style="display: block; color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase;">Typ</label>
                    <select name="expense_type">
                        <option value="FOOD">🍟 Verpflegung</option>
                        <option value="RENTAL">🛴 Miete</option>
                        <option value="FEE">🎟️ Eintritt/Gebühr</option>
                        <option value="OTHER" selected>📦 Sonstiges</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase;">Anzahl (z.B. Tage)</label>
                    <input type="number" name="units" value="1" min="1">
                </div>
            </div>

            <div>
                <label style="display: block; color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase;">Preis pro Einheit (in €)</label>
                <input type="number" step="0.01" name="unit_price" value="0.00">
            </div>

            <div style="margin-top: 10px;">
                <button type="submit" class="btn-primary" style="width: 100%; padding: 12px;">SPEICHERN</button>
            </div>
        </form>
    </div>
</div>
