{% load i18n %}
<div class="modal fade show" style="display: block;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-gold-light shadow-premium">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-warning">
                    <i class="bi bi-calendar-range me-2"></i>{% trans "Reisezeitraum anpassen" %}
                </h5>
                <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
            </div>
            <div class="modal-body p-4">
                <p class="text-secondary small mb-4">
                    Hier kannst du die gesamte Reise verschieben. Alle Tage, Buchungen und Checklisten-Fristen rücken automatisch mit.
                </p>
                
                <form hx-post="{% url 'travel:trip_shift_dates' trip.id %}" hx-target="body">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label text-light small">Verschiebung in Tagen</label>
                        <div class="d-flex align-items-center gap-3">
                            <button type="button" class="btn btn-outline-secondary rounded-circle" 
                                    onclick="adjustOffset(-1)">-</button>
                            <input type="number" name="offset" id="shift-offset" value="0" 
                                   class="form-control bg-dark border-secondary text-center text-warning fw-bold fs-4" 
                                   style="width: 100px;">
                            <button type="button" class="btn btn-outline-secondary rounded-circle" 
                                    onclick="adjustOffset(1)">+</button>
                        </div>
                    </div>

                    <div class="p-3 bg-secondary bg-opacity-10 rounded-3 mb-4">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-secondary small">Aktueller Start:</span>
                            <span class="text-light">{{ trip.start_date|date:"d.m.Y" }}</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-secondary small">Neuer Start:</span>
                            <span class="text-warning fw-bold" id="new-start-preview">{{ trip.start_date|date:"d.m.Y" }}</span>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-secondary flex-grow-1" onclick="closeModal()">
                            Abbrechen
                        </button>
                        <button type="submit" class="btn btn-warning flex-grow-1">
                            Anwenden & Verschieben
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function adjustOffset(val) {
        const input = document.getElementById('shift-offset');
        input.value = parseInt(input.value) + val;
        updatePreview();
    }

    function updatePreview() {
        const offset = parseInt(document.getElementById('shift-offset').value);
        const originalDateStr = "{{ trip.start_date|date:'Y-m-d' }}";
        if (!originalDateStr) return;

        const date = new Date(originalDateStr);
        date.setDate(date.getDate() + offset);
        
        const preview = document.getElementById('new-start-preview');
        preview.innerText = date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    document.getElementById('shift-offset').addEventListener('input', updatePreview);
</script>
